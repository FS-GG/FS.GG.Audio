    notes: ["DEC-001 realized: the sink ships in FS.GG.Audio.Engine, not in FS.GG.Audio.Host as issue #27 literally requested. FS.GG.Audio.Engine already has a ProjectReference to FS.GG.Audio.Host (its IAudioBackend/IMixingBackend come from there), so an engine-stepping helper inside Host would be a dependency cycle — it cannot compile. The requester's intent is preserved: the documented one-liner mixes by default and Audio.play stays the explicit fire-and-forget opt-out."]
