    result: pass
    synthetic: false
    notes: ["DEC-002 realized: a sink owns one Engine.T and a monotonic Stopwatch; dt is the interval between successive calls and the FIRST call advances by 0.0, so a sink built at startup and first driven seconds later cannot instantly complete an envelope installed in between. Named create... precisely because the closure owns mutable state: rebuilt per frame it would carry a fresh engine and mix nothing, which is the original bug wearing a new hat."]
