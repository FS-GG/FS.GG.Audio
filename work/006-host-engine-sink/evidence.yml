    notes: ["Engine.createSink returns an AudioEffect list -> unit that steps an owned Engine.T. The test drives the SAME batch [setBusVolume Sfx 0.5; playSfx s 1.0] through both same-typed sinks: the raw Host.Audio.play path realizes PlaySfx(s, 1.0) at full gain with SetBusVolume discarded, while the sink folds the bus gain in and realizes the voice at 0.5. That contrast IS issue #27."]
