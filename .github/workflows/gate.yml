name: gate

# Required check for FS.GG.Audio: deterministic locked-restore build + full headless test suite on
# every push/PR to main. Never publishes (that is release.yml, tag-triggered only).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Build + test (locked restore, net10.0, headless)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Restore (locked)
        run: |
          set -euo pipefail
          if ! dotnet restore FS.GG.Audio.slnx --locked-mode; then
            echo "::error::locked restore failed — the resolved graph does not match the committed packages.lock.json. If intentional, run: dotnet restore FS.GG.Audio.slnx --force-evaluate  and commit the lockfiles."
            exit 1
          fi
      - name: Build (Debug, --no-restore)
        run: dotnet build FS.GG.Audio.slnx -c Debug --no-restore
      - name: Test (full headless suite, --no-restore)
        run: dotnet test FS.GG.Audio.slnx -c Debug --no-restore

      # A missing package readme surfaces only at `dotnet pack`/push, never in a normal build or
      # test run — the same late, release-time-only failure class as the NU5104 trap. Pack here so
      # the gate catches it on the PR instead of at the next tag cut.
      - name: Pack + assert every package carries its readme
        run: |
          set -euo pipefail
          dotnet pack FS.GG.Audio.slnx -c Release --no-restore -o ./artifacts
          for id in FS.GG.Audio.Core FS.GG.Audio.Host FS.GG.Audio.Engine FS.GG.Audio.Elmish; do
            # Glob rather than rebuild the filename from <FsGgAudioVersion>: NuGet normalizes the
            # version it stamps into the name (0.1.0+ci -> 0.1.0), so a reconstructed path would
            # miss and report a missing readme for a package that is in fact fine.
            pkg=$(echo ./artifacts/${id}.*.nupkg)
            if [ ! -f "$pkg" ]; then
              echo "::error::${id}: no .nupkg produced at ${pkg} — cannot verify its readme."
              exit 1
            fi
            if ! unzip -p "$pkg" "${id}.nuspec" | grep -q '<readme>README.md</readme>'; then
              echo "::error::${id}: nuspec carries no <readme>. nuget.org warns 'Readme missing' and renders no body (#8)."
              exit 1
            fi
            if ! unzip -l "$pkg" | grep -qE ' README\.md$'; then
              echo "::error::${id}: declares a readme but does not pack README.md (#8)."
              exit 1
            fi
          done
