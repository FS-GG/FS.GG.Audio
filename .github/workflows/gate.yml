name: gate

# Required check for FS.GG.Audio: deterministic locked-restore build + full headless test suite on
# every push/PR to main. Never publishes (that is release.yml, tag-triggered only).
#
# "Required" is literally true only since #60. Before it, `main` carried no branch protection and no
# rulesets, so every assertion below — the cold locked restore (#429), the non-vacuous headless device
# lane (#42), the readme/pack check (#8), the lock-range coherence gate (#54) — ran, reported, and
# BLOCKED NOTHING. A red gate was advisory: the repo's own recurring defect one level up, not a gate
# that reports green over a missing subject but a gate whose verdict had no subject to act on.
# Protection now requires exactly two contexts:
#
#     Build + test (locked restore, net10.0, headless)   <- the build-test job's `name:`
#     lock-ranges / lock-ranges                          <- `<job id> / <reusable workflow's job name>`
#
# Those strings are the binding, they are matched LITERALLY, and they live in repo settings — out of
# tree, which is both why this file cannot enforce them and why this comment can drift from them.
# The trap that buys: renaming a job does not RELABEL its required check, it makes that check stop
# REPORTING — and a context that never reports is never satisfied, so every PR blocks forever on a
# check that will never arrive, with enforce_admins on and no bypass. Rename `build-test`'s `name:`
# and the contexts must move in the same change:
#
#     gh api repos/FS-GG/FS.GG.Audio/branches/main/protection
#
# And only HALF of `lock-ranges / lock-ranges` is ours to rename. The second segment is the job id
# INSIDE FS-GG/.github's lock-range-coherence.yml, which the `uses:` below tracks at the moving ref
# @main. That rename can therefore land in a repo Audio does not own, in a commit nobody here
# reviews, and deadlock every PR to this branch with nothing in Audio having changed. Audio is the
# first FS-GG repo to require a reusable-workflow-nested context, so it is the first exposed to it:
# filed as FS-GG/.github#549, which asks for the check that would ASSERT this (every required context
# is one that something still reports) instead of leaving it to whoever remembers to read this
# comment — the same "assert, don't remember" the lock-ranges block below is built on.
#
# `kit / coordination-kit` reports on PRs here but is deliberately NOT required, matching
# FS.GG.SDD and FS.GG.Rendering: both report it, neither gates on it.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # The blind spot --locked-mode CANNOT cover (#51): it validates package entries — id, version,
  # contentHash — but never the dependency ranges under a `"type": "Project"` entry. A release bump
  # that edits a version WITHOUT regenerating the locks therefore freezes every project-reference
  # range at the old version, and every gate stays green over it; main carried six stale ranges
  # through the whole v0.2.0 cycle. Harmless at runtime (project references resolve from the project
  # graph, not the lock), which is exactly why it survives — the cost is a poisoned lock diff.
  #
  # Proved here in #52 as ~71 lines of inline bash, then lifted into a reusable workflow by
  # .github#495 so the check is authored once and cannot drift per repo (#54). Static: committed
  # files only — no restore, no SDK, no network, no feed — so it needs nothing beyond contents: read.
  #
  # The shared gate resolves each project's own effective <Version> rather than this repo's central
  # <FsGgAudioVersion>, because that is the only rule true of all three receivers. For Audio the two
  # agree exactly: every project sets <Version>$(FsGgAudioVersion)</Version>.
  #
  # min-ranges is this repo's DECLARED subject count, not the default floor of 1. The default only
  # catches a drop to zero, and the way this check degrades is not to zero: a range is matched by
  # looking its dependency up among the package ids this repo's projects produce, so if that
  # resolution drifts — a renamed <PackageId>, a lock that keys its entries differently — the
  # unmatched ranges are silently SKIPPED rather than failed. 16 of 17 could vanish and a floor of 1
  # would still print "ok". Declaring 17 makes that a red gate. It cannot cry wolf on growth: adding
  # a project, a reference or a TFM only raises the count, and the floor trips only on a genuine
  # reduction — which is a decision someone should have to make explicitly. (Epic #266, and #416's
  # silent-no-op family: "nothing to check" and "checked, and it is fine" must not share an exit code.)
  lock-ranges:
    uses: FS-GG/.github/.github/workflows/lock-range-coherence.yml@main
    with:
      min-ranges: 17

  build-test:
    name: Build + test (locked restore, net10.0, headless)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      # The restore must be COLD (FS-GG/.github#429, epic #266 "compare against reality, not against
      # a record of reality").
      #
      # NU1403 ("package content hash validation failed") is raised by comparing the lock file against
      # the package ALREADY PRESENT in the global-packages folder. If that copy is stale — pre-seeded
      # in the runner image, or left by an earlier restore — then --locked-mode validates one record
      # against another and never contacts the feed. The gate then fails in BOTH directions, which is
      # exactly what FSharp.Core 10.1.301 did after it was re-published:
      #
      #   * green on main with a lock file NO FRESH CLONE COULD RESTORE   (fails open), and
      #   * red on a correct, freshly-generated lock file                 (fails closed).
      #
      # Restoring into an empty NUGET_PACKAGES forces a real download, so the hash the gate checks is
      # the hash the feed actually serves. It is exported to GITHUB_ENV so the later --no-restore
      # build / test / pack steps resolve from that same folder.
      #
      # NOTE: NUGET_PACKAGES relocates the global-packages folder but NOT the HTTP cache, which will
      # happily replay stale .nupkg bytes. Clearing it is load-bearing, not belt-and-braces.
      - name: Restore (locked, cold)
        run: |
          set -euo pipefail

          NUGET_PACKAGES="$(mktemp -d)"
          export NUGET_PACKAGES
          echo "NUGET_PACKAGES=$NUGET_PACKAGES" >> "$GITHUB_ENV"
          dotnet nuget locals http-cache --clear

          if dotnet restore FS.GG.Audio.slnx --locked-mode; then
            exit 0
          fi

          # The restore failed against the feed. Don't leave the author guessing which of three
          # plausible hashes to paste: the lock's contentHash, the .nupkg's own SHA512, and the
          # catalog packageHash are THREE DIFFERENT values, and only the first is ever validated.
          # Regenerate from the feed and print exactly what to commit.
          echo "::group::what a cold restore from the feed actually resolves (commit this)"
          dotnet restore FS.GG.Audio.slnx --force-evaluate >/dev/null 2>&1 || true
          git --no-pager diff --stat -- '**/packages.lock.json' || true
          git --no-pager diff -- '**/packages.lock.json' || true
          echo "::endgroup::"

          echo "::error::locked restore failed — the committed packages.lock.json does not match what the feed serves (or a version was substituted, NU1603). The diff above is what a cold restore resolves; regenerate with: dotnet restore FS.GG.Audio.slnx --force-evaluate  and commit the updated lockfiles. Let --force-evaluate write the hash — never hand-copy one, and note the lock's contentHash is NOT the .nupkg's SHA512."
          exit 1
      - name: Build (Debug, --no-restore)
        run: dotnet build FS.GG.Audio.slnx -c Debug --no-restore
      # The device lane, and the assertion that it actually ran. Shared with release.yml — see
      # .github/actions/headless-test for why this is an action rather than a block pasted into both.
      - uses: ./.github/actions/headless-test

      # The showcase claims, in its own footer, that the transcript is identical every run — the
      # mixer advances on a fixed dt and only the sleeping is real. That is a claim about the library
      # (a deterministic mixer), not about the sample, so it is worth holding it to. --fast, because
      # the real-time run sleeps its way through ~20s of audio for no benefit here.
      - name: Showcase runs, and is deterministic
        run: |
          set -euo pipefail
          dotnet run --project samples/FS.GG.Audio.Showcase -c Debug --no-restore -- --fast > showcase-1.txt
          dotnet run --project samples/FS.GG.Audio.Showcase -c Debug --no-restore -- --fast > showcase-2.txt
          if ! diff -u showcase-1.txt showcase-2.txt; then
            echo "::error::the showcase transcript differs between two identical runs. Its footer claims determinism and the mixer is supposed to advance on a fixed dt — something is reading the wall clock."
            exit 1
          fi
          echo "showcase deterministic across runs."

      # A missing package readme surfaces only at `dotnet pack`/push, never in a normal build or
      # test run — the same late, release-time-only failure class as the NU5104 trap. Pack here so
      # the gate catches it on the PR instead of at the next tag cut.
      - name: Pack + assert every package carries its readme
        run: |
          set -euo pipefail
          dotnet pack FS.GG.Audio.slnx -c Release --no-restore -o ./artifacts
          for id in FS.GG.Audio.Core FS.GG.Audio.Host FS.GG.Audio.Engine FS.GG.Audio.Elmish; do
            # Glob rather than rebuild the filename from <FsGgAudioVersion>: NuGet normalizes the
            # version it stamps into the name (0.1.0+ci -> 0.1.0), so a reconstructed path would
            # miss and report a missing readme for a package that is in fact fine.
            pkg=$(echo ./artifacts/${id}.*.nupkg)
            if [ ! -f "$pkg" ]; then
              echo "::error::${id}: no .nupkg produced at ${pkg} — cannot verify its readme."
              exit 1
            fi
            if ! unzip -p "$pkg" "${id}.nuspec" | grep -q '<readme>README.md</readme>'; then
              echo "::error::${id}: nuspec carries no <readme>. nuget.org warns 'Readme missing' and renders no body (#8)."
              exit 1
            fi
            if ! unzip -l "$pkg" | grep -qE ' README\.md$'; then
              echo "::error::${id}: declares a readme but does not pack README.md (#8)."
              exit 1
            fi
          done

          # THE LGPL NOTICE MUST TRAVEL WITH THE BINARY (review 2026-07-16 §3.9).
          #
          # Host/Engine/Elmish redistribute the OpenAL Soft native (LGPL-2.0-or-later) while declaring
          # PackageLicenseExpression=MIT. That is fine — the native is separate, dynamically linked and
          # replaceable (DEC-001) — but only because the recipient is told, and the LGPL's terms for a
          # work that merely uses the library turn on the telling. The notice going missing is not a
          # cosmetic regression, and like the readme it would surface only at a tag cut, on the one
          # artifact nobody re-reads before pushing it to nuget.org.
          #
          # Asserted in BOTH directions on purpose. Core must NOT carry it: Core has no native
          # dependency (FR-006), so the notice would assert something false about it, and a licence
          # notice that overclaims is its own kind of wrong. The absent case is also the one a
          # copy-paste `<None Include>` into the wrong project silently breaks.
          for id in FS.GG.Audio.Host FS.GG.Audio.Engine FS.GG.Audio.Elmish; do
            pkg=$(echo ./artifacts/${id}.*.nupkg)
            if ! unzip -l "$pkg" | grep -qE ' THIRD-PARTY-NOTICES\.md$'; then
              echo "::error::${id}: redistributes the LGPL OpenAL Soft native but packs no THIRD-PARTY-NOTICES.md. The notice has to ship with the bytes it is about — see the RedistributesOpenAlNative property in Directory.Build.props."
              exit 1
            fi
            if ! unzip -p "$pkg" "${id}.nuspec" | grep -q 'LGPL'; then
              echo "::error::${id}: nuspec <description> does not mention the LGPL native. nuget.org shows the description, not the packed files, and it declares this package MIT."
              exit 1
            fi
          done
          if unzip -l ./artifacts/FS.GG.Audio.Core.*.nupkg | grep -qE ' THIRD-PARTY-NOTICES\.md$'; then
            echo "::error::FS.GG.Audio.Core packs THIRD-PARTY-NOTICES.md, which says the package redistributes OpenAL Soft. Core has no native dependency (FR-006) and that claim is false — either Core grew one, which is a bigger problem, or the notice leaked into the wrong project."
            exit 1
          fi
          echo "third-party notice ships with Host/Engine/Elmish; Core stays clean."

  # ── Cross-repo contract-coherence gate ──────────────────────────────────────────────────
  # Adopted per FS-GG/.github#519 (decision: yes, the framework repos call it). The gate lives
  # in FS-GG/.github and is CALLED, never copied — it asserts that the org registry is
  # schema-valid and that its declared `fsgg-contracts` pin equals the ACTUAL FS.GG.Contracts
  # package version.
  #
  # `check-build-config: false` because registry/repos.yml does NOT list `build-config` under
  # this repo's `receives:` — it is not an adopter of the org-shared .NET build config, so the
  # drift leg has no subject here and would fail on a file this repo is not supposed to have.
  # This is read off the registry, not a workaround: if that `receives:` row ever gains
  # `build-config`, flip this to true in the same change.
  #
  # `packages: read` is MANDATORY for callers: the gate restores the typed fsgg-sdd registry
  # validator from the org GitHub Packages feed using the run-scoped GITHUB_TOKEN.
  contract-coherence:
    uses: FS-GG/.github/.github/workflows/contract-coherence.yml@main
    permissions:
      contents: read
      packages: read
    with:
      check-build-config: false
